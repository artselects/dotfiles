# ── Tmux config ──────────────────────────────────────────────────

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix: Ctrl+a (easier than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse support
set -g mouse on
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# Faster escape
set -sg escape-time 10

# History
set -g history-limit 50000

# Focus events (for vim/neovim)
set -g focus-events on

# ── Key bindings ──
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with Alt+arrow (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with Ctrl+arrow
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ── Status bar ──
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[bg=#1e1e2e] "
set -g status-right "#[fg=#a6adc8] %H:%M  %d-%b "
set -g status-left-length 30
set -g status-right-length 40

# Window status
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "

# Pane borders (Catppuccin-inspired)
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message style
set -g message-style "bg=#89b4fa,fg=#1e1e2e"
