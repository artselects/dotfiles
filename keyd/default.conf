# keyd configuration for macOS-like layout on Linux
# Place this in /etc/keyd/default.conf

[ids]
*

[main]
# Remap to: Control, Fn, Option (Alt), Command (Meta)
# Physical Win -> Option (Alt)
# Physical Alt -> Command (Meta)
leftalt = layer(meta)
leftmeta = layer(alt)

[meta]
# Universal Linux Copy/Paste (Works in Browsers & Terminals)
# These do NOT send the 'Stop' (SIGINT) signal.
c = C-insert
v = S-insert
x = C-x
a = C-a
z = C-z
f = C-f
t = C-t
w = C-w
l = C-l
s = C-s
n = C-n
r = C-r
q = A-f4
